<div class="page__footer-follow">
  <ul class="social-icons">
    {% if site.footer.links %}
      {% for link in site.footer.links %}
        <li>
          <a href="{{ link.url }}" rel="nofollow noopener noreferrer" target="_blank">
            <i class="{{ link.icon }}" aria-hidden="true"></i>
            <span>{{ link.label }}</span>
          </a>
        </li>
      {% endfor %}
    {% endif %}
  </ul>
</div>

<div class="page__footer-copyright">
  <p>
    © {{ site.time | date: '%Y' }} Edo Almeida · Powered by
    <a href="https://jekyllrb.com/" target="_blank" rel="noopener noreferrer">Jekyll</a>
    &
    <a href="https://mmistakes.github.io/minimal-mistakes/" target="_blank" rel="noopener noreferrer">Minimal Mistakes</a>
  </p>
</div>
